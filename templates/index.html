<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bright AI Chatbot</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f172a, #2563eb, #7c3aed);
            --card: rgba(255,255,255,0.95);
            --accent: #2563eb;
            --accent-2: #7c3aed;
            --text: #111827;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .chat-shell {
            width: 100%;
            max-width: 860px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .hero {
            padding: 28px 30px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: white;
        }
        .hero h1 { margin: 0 0 8px; font-size: 28px; }
        .hero p { margin: 0; opacity: 0.95; }
        .chat-area {
            padding: 24px 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .bubble {
            max-width: 80%;
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.5;
            box-shadow: 0 6px 16px rgba(15,23,42,0.08);
            white-space: pre-wrap;
        }
        .bubble.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bubble.bot {
            align-self: flex-start;
            background: #f3f4f6;
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        form {
            display: flex;
            gap: 10px;
            padding: 0 24px 24px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            font-size: 15px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.16);
        }
        button {
            border: none;
            padding: 14px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { transform: translateY(-1px); }
        .hint { color: var(--muted); font-size: 13px; padding: 0 24px 12px; }
    </style>
</head>
<body>
    <div class="chat-shell">
        <div class="hero">
            <h1>✨ Bright AI Chatbot</h1>
            <p>Ask anything and get a friendly, smart response in seconds.</p>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="bubble bot">Hello! I’m your AI assistant. Ask me anything.</div>
        </div>

        <div class="hint">Try: “What is Artificial Intelligence?”</div>

        <form id="chat-form">
            <input id="question" type="text" placeholder="Type your question here..." required />
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const chatArea = document.getElementById('chat-area');
        const questionInput = document.getElementById('question');

        function addBubble(text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            addBubble(question, 'user');
            questionInput.value = '';
            addBubble('Thinking...', 'bot');

            try {
                const response = await fetch(`/ask?question=${encodeURIComponent(question)}`);
                const data = await response.json();
                const lastBubble = chatArea.lastElementChild;
                if (lastBubble && lastBubble.classList.contains('bot')) {
                    lastBubble.textContent = data.answer || 'No answer returned.';
                }
            } catch (error) {
                const lastBubble = chatArea.lastElementChild;
                if (lastBubble && lastBubble.classList.contains('bot')) {
                    lastBubble.textContent = 'Error: ' + error.message;
                }
            }
        });
    </script>
</body>
</html>
